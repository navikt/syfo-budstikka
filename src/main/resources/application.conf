ktor {
  deployment {
    port = 8080
  }
  application {
    modules = [ no.nav.budstikka.ApplicationKt.module ]
  }
}

database {
  host = ${?BUDSTIKKA_DB_HOST}
  port = ${?BUDSTIKKA_DB_PORT}
  name = ${?BUDSTIKKA_DB_DATABASE}
  username = ${?BUDSTIKKA_DB_USERNAME}
  password = ${?BUDSTIKKA_DB_PASSWORD}
  url = "postgresql://"${database.host}":"${database.port}"/"${database.name}
  url = ${?BUDSTIKKA_DB_URL}
  sslkey = ${?BUDSTIKKA_DB_SSLKEY_PK8}

  hikari {
    maximumPoolSize = 5
    minimumIdle = 2
    connectionTimeout = 10000
    idleTimeout = 300000
    maxLifetime = 1800000
  }
}

auth {
  texas {
    tokenEndpoint = ${?NAIS_TOKEN_ENDPOINT}
    identityProvider = "entra_id"
    identityProvider = ${?NAIS_TOKEN_IDENTITY_PROVIDER}
  }
}

kafka {
  bootstrapServers = "localhost:9092"
  bootstrapServers = ${?KAFKA_BOOTSTRAP_SERVERS}
  bootstrapServers = ${?KAFKA_BROKERS}

  consumers {
    budstikka {
      enabled = ${?KAFKA_BUDSTIKKA_ENABLED}
      topic = "team-esyfo.budstikka.v1"
      topic = ${?KAFKA_BUDSTIKKA_TOPIC}
      groupId = "syfo-budstikka-budstikka-v1"
      groupId = ${?KAFKA_BUDSTIKKA_GROUP_ID}
      autoOffsetReset = "earliest"
      autoOffsetReset = ${?KAFKA_BUDSTIKKA_AUTO_OFFSET_RESET}
      maxPollRecords = 100
      maxPollRecords = ${?KAFKA_BUDSTIKKA_MAX_POLL_RECORDS}
    }
  }

  producers {
    minside {
      topic = "min-side.aapen-microfrontend-v1"
      topic = ${?KAFKA_MINSIDE_TOPIC}
    }
  }

  truststorePath = ${?KAFKA_TRUSTSTORE_PATH}
  keystorePath = ${?KAFKA_KEYSTORE_PATH}
  credentialStorePassword = ${?KAFKA_CREDSTORE_PASSWORD}
}

workers {
  inboxMessage {
    intervalSeconds = 3
    intervalSeconds = ${?WORKER_INBOX_MESSAGE_INTERVAL_SECONDS}
    batchSize = 25
    batchSize = ${?WORKER_INBOX_MESSAGE_BATCH_SIZE}
    leaseSeconds = 300
    leaseSeconds = ${?WORKER_INBOX_MESSAGE_LEASE_SECONDS}
    leaseBudgetFraction = 0.8
    leaseBudgetFraction = ${?WORKER_INBOX_MESSAGE_LEASE_BUDGET_FRACTION}
    maxAttempts = 10
    maxAttempts = ${?WORKER_INBOX_MESSAGE_MAX_ATTEMPTS}
    maxConsecutiveItemFailures = 3
    maxConsecutiveItemFailures = ${?WORKER_INBOX_MESSAGE_MAX_CONSECUTIVE_ITEM_FAILURES}
  }
  delivery {
    intervalSeconds = 3
    intervalSeconds = ${?WORKER_DELIVERY_INTERVAL_SECONDS}
    batchSize = 25
    batchSize = ${?WORKER_DELIVERY_BATCH_SIZE}
    leaseSeconds = 300
    leaseSeconds = ${?WORKER_DELIVERY_LEASE_SECONDS}
    leaseBudgetFraction = 0.8
    leaseBudgetFraction = ${?WORKER_DELIVERY_LEASE_BUDGET_FRACTION}
    maxAttempts = 10
    maxAttempts = ${?WORKER_DELIVERY_MAX_ATTEMPTS}
    maxConsecutiveItemFailures = 3
    maxConsecutiveItemFailures = ${?WORKER_DELIVERY_MAX_CONSECUTIVE_ITEM_FAILURES}
  }
}
