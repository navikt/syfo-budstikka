# Test-/lokal override-lag. Lastes av BudstikkaTestApp.testConfig og legges OPPÅ prod-konfigen
# (application.conf) via withFallback: application-local.conf vinner over application.conf, og
# dynamiske container-verdier i koden vinner over begge.
#
# Fila har MED VILJE et distinkt navn (ikke application.conf): begge resources-katalogene ligger på
# samme test-classpath, så en test-fil ved navn application.conf ville kunne skygge prod-konfigen
# avhengig av classpath-rekkefølge. Distinkt navn + eksplisitt withFallback gjør skygging umulig.
#
# KUN STATISKE lokale verdier hører hjemme her. Container-verdiene
# (database.host/port/name/username/password/url og kafka.bootstrapServers) er runtime-verdier fra
# Testcontainers — ukjente før containerne er oppe — og settes derfor i kode i
# BudstikkaTestApp.testConfig, ikke her.

pdl.scope = "local"

auth.texas.tokenEndpoint = "localhost"

kafka.consumers.budstikka.enabled = "true"

# Lokal monitoring (Grafana/Prometheus-containere) — kun et menneske-inspeksjonsverktøy for det
# lokale løpet (LocalApp). AV som standard for rask oppstart uten containerne; slå på med
# MONITORING_ENABLED=true. Kun det lokale løpet leser dette: e2e sender aldri withMonitoring-factory
# til BudstikkaTestApp.start, så flagget er inert der uansett verdi.

monitoring {
    enabled = "false"
    enabled = ${?MONITORING_ENABLED}
}

ktor {
  # Modulen lastes programmatisk i BudstikkaTestApp.start (configureApplication), ikke fra konfigen.
  application.modules = []
  # Lar overrides-lambdaen (fakes) vinne over de ekte adapterne i DI-grafen.
  di.conflictPolicy = "OverridePrevious"
}
