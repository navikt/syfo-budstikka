[tools]
java = "25"

[env]
BUDSTIKKA_DB_USERNAME = "budstikka"
BUDSTIKKA_DB_PASSWORD = "budstikka"
# With testcontainers, the port is dynamically allocated. To test flyway migrations copy and paste the url in your local mise.local.toml file. The url can be found in the logs when running mr dev:tc.
BUDSTIKKA_DB_URL = "jdbc:postgresql://localhost:32816/budstikka?loggerLevel=OFF&currentSchema=test_42e4c56c077141f58edda92f552e50a4"
KAFKA_BUDSTIKKA_ENABLED = "true"

# App lifecycle
[tasks.dev]
description = "Run app using gradle"
run = './gradlew run'

# Kjører hele appen lokalt mot Testcontainers (Postgres + Kafka + Kafka UI) med fakes wiret inn —
# trenger IKKE docker-compose-infraen (`infra`). Ctrl+C river ned containerne. Se docs/TESTSTRATEGI.md.
[tasks."dev:tc"]
description = "Run app locally against Testcontainers (Postgres + Kafka + Kafka UI), no compose needed"
run = './gradlew runLocal'

# Quality checks
[tasks.build]
description = "Run build with gradle"
run = './gradlew build'

[tasks.test]
description = "Run tests with gradle"
run = './gradlew test'

# Opt-in e2e: KUN de @Tags("E2E")-taggede full-boot-specene mot Testcontainers. Ikke koblet til
# `test`/`build`, så deploy-løpet slipper å vente på trege e2e-tester. Se docs/TESTSTRATEGI.md.
[tasks."test:e2e"]
description = "Run opt-in e2e tests (full-boot against Testcontainers)"
run = './gradlew e2eTest'

[tasks.lint]
description = "Run check with gradle"
run = './gradlew ktlintCheck'

[tasks.format]
description = "Run ktlintFormat with gradle"
run = './gradlew ktlintFormat'

# Database migrations
[tasks."migration:info"]
description = "Database migrations info"
run = [{ task = "migration:_run", args = ["flywayInfo"] }]

[tasks."migration:migrate"]
description = "Run database migrations"
run = [{ task = "migration:_run", args = ["flywayMigrate"] }]

[tasks."migration:validate"]
description = "Validate database migrations"
run = [{ task = "migration:_run", args = ["flywayValidate"] }]

[tasks."migration:repair"]
description = "Repair database migrations"
run = [{ task = "migration:_run", args = ["flywayRepair"] }]

# Hidden task shared by migration:* commands
[tasks."migration:_run"]
hide = true
usage = 'arg "<flyway_task>"'
run = '''
./gradlew --no-configuration-cache --warning-mode=none \
  -Dflyway.locations=filesystem:src/main/resources/database.migration \
  -Dflyway.user="${BUDSTIKKA_DB_USERNAME}" \
  -Dflyway.password="${BUDSTIKKA_DB_PASSWORD}" \
  -Dflyway.url="${BUDSTIKKA_DB_URL}" \
  "${usage_flyway_task?}"
'''
