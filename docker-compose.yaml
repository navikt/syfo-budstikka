services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ${BUDSTIKKA_DB_DATABASE:-flaggskipet}
      POSTGRES_USER: ${BUDSTIKKA_DB_USERNAME:-flaggskipet}
      POSTGRES_PASSWORD: ${BUDSTIKKA_DB_PASSWORD:?Set BUDSTIKKA_DB_PASSWORD locally before starting Postgres}
    ports:
      - "${BUDSTIKKA_DB_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${BUDSTIKKA_DB_USERNAME:-flaggskipet} -d ${BUDSTIKKA_DB_DATABASE:-flaggskipet}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  postgres-data:
