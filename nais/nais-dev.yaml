apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: syfo-budstikka
  namespace: team-esyfo
  labels:
    team: team-esyfo
  annotations:
    texas.nais.io/enabled: "true" # Texas token-sidecar for M2M (NAIS_TOKEN_ENDPOINT)
spec:
  image: {{image}}
  port: 8080
  # Stier MÅ matche InternalApi.kt (POD_HEALTH_PATH + is_alive/is_ready). Interne endepunkter er åpne (B48).
  liveness:
    path: /internal/health/is_alive
    initialDelay: 10
    timeout: 5
    periodSeconds: 10
    failureThreshold: 5
  readiness:
    path: /internal/health/is_ready
    initialDelay: 10
    periodSeconds: 5
    timeout: 5
  resources:
    limits:
      memory: 1024Mi
    requests:
      cpu: 100m
      memory: 512Mi
  # MIDLERTIDIG AV: replicas 0/0 skrur workloaden av i dev inntil vi aktiverer den i egen PR.
  # Når den skrus på: min 1 / max 2 (SKIP LOCKED tåler N like instanser, B27). Ingen leaderElection:
  # periodiske sveip koordineres med Postgres advisory lock, ikke leder-valg (B12/B42).
  replicas:
    min: 0
    max: 0
  prometheus:
    enabled: true
    path: /internal/metrics # POD_METRICS_PATH; avstemmer B57/B48 (metrics, ikke prometheus)
  observability:
    logging:
      destinations:
        - id: elastic
        - id: loki
    autoInstrumentation:
      enabled: true
      runtime: java # OTel-agent setter W3C traceparent → Tempo (B45/B48)
  kafka:
    pool: nav-dev # topic: nais/topics/kafka-dev.yaml (team-esyfo.budstikka.v1)
  # M2M (client_credentials/entra_id) for PDL-død-gaten. startWorkers() resolver DeathGate→PdlClient
  # eager ved boot (WorkerModule), som validerer NAIS_TOKEN_ENDPOINT + PDL_SCOPE → azure kreves for
  # å boote. Budstikka har ingen innkommende HTTP-auth (ren consumer) → ingen inbound/claims.
  azure:
    application:
      enabled: true
  accessPolicy:
    outbound:
      external:
        - host: pdl-api.dev-fss-pub.nais.io # PDL i FSS; samme host/scope som esyfovarsel dev
  gcp:
    sqlInstances:
      - name: budstikka-instance
        collation: nb_NO
        type: POSTGRES_18 # esyfovarsel kjørte 17; budstikka på 18 (docs/teknologi.md)
        tier: db-f1-micro
        diskAutoresize: true
        databases:
          - name: budstikka-db
            # application.conf leser BUDSTIKKA_DB_URL/_USERNAME/_PASSWORD/_SSLKEY_PK8
            envVarPrefix: BUDSTIKKA_DB
  env:
    - name: PDL_URL
      value: https://pdl-api.dev-fss-pub.nais.io/graphql
    - name: PDL_SCOPE
      value: api://dev-fss.pdl.pdl-api/.default
  # UTSATT (område 5 — resten av Auth & ACL, ugrillet i CONTEXT.md): tokenx-inbound + outbound mot
  # KRR/narmesteleder/dokdist/notifikasjon-produsent-api. Legges til når de kanalene wires (ingen
  # av dem resolves eager ved boot i dag — kun DeathGate/PDL er i DecisionRule-lista).
