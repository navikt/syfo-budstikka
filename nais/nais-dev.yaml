apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: syfo-budstikka
  namespace: team-esyfo
  labels:
    team: team-esyfo
  annotations:
    texas.nais.io/enabled: "true"
spec:
  image: {{image}}
  port: 8080
  liveness:
    path: /internal/health/is_alive
    initialDelay: 10
    timeout: 5
    periodSeconds: 10
    failureThreshold: 5
  readiness:
    path: /internal/health/is_ready
    initialDelay: 10
    periodSeconds: 5
    timeout: 5
  resources:
    limits:
      memory: 1024Mi
    requests:
      cpu: 100m
      memory: 512Mi
  replicas:
    min: 1
    max: 2
  prometheus:
    enabled: true
    path: /internal/metrics
  observability:
    logging:
      destinations:
        - id: loki
    autoInstrumentation:
      enabled: true
      runtime: java # OTel-agent setter W3C traceparent → Tempo (B45/B48)
  kafka:
    pool: nav-dev
  azure:
    application:
      enabled: true
  accessPolicy:
    outbound:
      rules:
        - application: digdir-krr-proxy
          namespace: team-rocket
      external:
        - host: pdl-api.dev-fss-pub.nais.io
        - host: dokdistfordeling-q1.dev-fss-pub.nais.io
  gcp:
    sqlInstances:
      - name: budstikka-instance
        collation: nb_NO
        type: POSTGRES_18
        tier: db-f1-micro
        diskAutoresize: true
        databases:
          - name: budstikka-db
            envVarPrefix: BUDSTIKKA_DB
  env:
    - name: PDL_URL
      value: https://pdl-api.dev-fss-pub.nais.io/graphql
    - name: PDL_SCOPE
      value: api://dev-fss.pdl.pdl-api/.default
    - name: DOCUMENT_DISTRIBUTOR_URL
      value: https://dokdistfordeling-q1.dev-fss-pub.nais.io/rest/v1/distribuerjournalpost
    - name: DOCUMENT_DISTRIBUTOR_SCOPE
      value: api://dev-fss.teamdokumenthandtering.dokdistfordeling-q1/.default
    - name: KRR_URL
      value: https://digdir-krr-proxy.intern.dev.nav.no/rest/v1/person
    - name: KRR_SCOPE
      value: api://dev-gcp.team-rocket.digdir-krr-proxy/.default
  # UTSATT (område 5 — resten av Auth & ACL, ugrillet i CONTEXT.md): tokenx-inbound + outbound mot
  # narmesteleder/notifikasjon-produsent-api. Legges til når de kanalene wires.
